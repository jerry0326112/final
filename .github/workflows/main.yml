name: Flight Price Tracker Pipeline

on:
  schedule:
    # 改為每天台灣時間上午 08:00 自動執行一次 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 保留這個！上課 Presentation 時可以在 GitHub 網頁上手動點擊執行給教授看

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Flight Price ETL Script
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python final.py

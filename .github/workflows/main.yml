name: Flight Tracker Data Pipeline

on:
  schedule:
    # 每 15 分鐘執行一次 (Cron 語法)
    - cron: '*/15 * * * *'
  workflow_dispatch: # 允許我們手動點擊按鈕測試

jobs:
  run-etl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run ETL Script
        env:
          # 從剛剛設定的保險箱中拿出密碼
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python final.py
